<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Lista de Categorías</h2>
    <a class="btn btn-primary" routerLink="/categorias/new">Nueva Categoría</a>
  </div>

  <table class="table table-striped table-hover shadow-sm">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cat of categorias">
        <td>{{ cat.id }}</td>
        <td>{{ cat.nombre }}</td>
        <td>{{ cat.descripcion }}</td>
        <td>
          <a class="btn btn-warning btn-sm me-2" [routerLink]="['/categorias/edit', cat.id]">Editar</a>
          <button class="btn btn-danger btn-sm" (click)="eliminarCategoria(cat.id)">Eliminar</button>
        </td>
      </tr>
      
      <tr *ngIf="categorias.length === 0">
        <td colspan="4" class="text-center text-muted">No hay categorías registradas por el momento.</td>
      </tr>
    </tbody>
  </table>
</div>
