<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-header text-white bg-success text-center">
          <h4>Crear Cuenta</h4>
        </div>
        <div class="card-body">
          
          <div class="alert alert-danger" *ngIf="mensajeError">
            {{ mensajeError }}
          </div>

          <form (ngSubmit)="registrar()">
            
            <div class="mb-3">
              <label class="form-label">Nombre Completo</label>
              <input type="text" class="form-control" name="nombre" [(ngModel)]="nuevoUsuario.nombre" required autofocus>
            </div>

            <div class="mb-3">
              <label class="form-label">Correo Electrónico</label>
              <input type="email" class="form-control" name="correo" [(ngModel)]="nuevoUsuario.correo" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" name="password" [(ngModel)]="nuevoUsuario.password" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
              Registrarme
            </button>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
