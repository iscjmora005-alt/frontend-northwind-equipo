<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">{{ editando ? 'Editar Categoría' : 'Nueva Categoría' }}</h4>
        </div>
        <div class="card-body">
          <form (ngSubmit)="guardarCategoria()">
            
            <div class="mb-3">
              <label class="form-label">Nombre de la Categoría</label>
              <input type="text" class="form-control" name="nombre" [(ngModel)]="categoria.nombre" required autofocus>
            </div>

            <div class="mb-3">
              <label class="form-label">Descripción</label>
              <textarea class="form-control" name="descripcion" [(ngModel)]="categoria.descripcion" rows="3"></textarea>
            </div>

            <div class="d-flex justify-content-between">
              <a routerLink="/categorias" class="btn btn-secondary">Cancelar</a>
              <button type="submit" class="btn btn-success">Guardar</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
