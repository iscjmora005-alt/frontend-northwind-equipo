
<div class="container mt-4">
  <h2>Lista de Productos</h2>
  <table class="table table-striped table-hover shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Precio</th>
      <th>Stock</th>
      <th>Categoría</th> <th>Acciones</th>  </tr>
  </thead>
  <tbody>
    <tr *ngFor="let product of products">
      <td>{{ product.id }}</td>
      <td>{{ product.name }}</td>
      <td>{{ product.price | currency }}</td>
      <td>{{ product.stock }}</td>
      <td>{{ $any(product).categoria || 'Sin categoría' }}</td>
      <td>
        <button class="btn btn-warning btn-sm me-2" [routerLink]="['/products/edit', product.id]">Editar</button>
        <button class="btn btn-danger btn-sm" (click)="deleteProduct(product.id!)">Eliminar</button>
      </td>
    </tr>
  </tbody>
</table>
</div>
