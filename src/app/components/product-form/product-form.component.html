<p>product-form works!</p>
<div class="container mt-4">
  <h2>{{ isEditMode ? 'Editar' : 'Nuevo' }} Producto</h2>
  <form (ngSubmit)="saveProduct()">
    <div class="mb-3">
      <label class="form-label">Nombre del producto</label>
      <input type="text" class="form-control" [(ngModel)]="product.name" name="productName" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Precio unitario</label>
      <input type="number" step="0.01" class="form-control" [(ngModel)]="product.price" name="unitPrice" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Unidades en stock</label>
      <input type="number" class="form-control" [(ngModel)]="product.stock" name="unitsInStock" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Imagen (opcional)</label>
      <input type="text" class="form-control" [(ngModel)]="product.imageUrl" name="imageUrl">
    </div>
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a routerLink="/products" class="btn btn-secondary ms-2">Cancelar</a>
  </form>
</div>
