<div class="container mt-4">
  <div class="card">
    <div class="card-header text-white bg-dark">
      <h3>{{ isEditMode ? 'Editar Producto' : 'Agregar Nuevo Producto' }}</h3>
    </div>
    <div class="card-body">
      
      <form (ngSubmit)="saveProduct()">
        
        <div class="mb-3">
          <label class="form-label">Nombre del Producto</label>
          <input type="text" class="form-control" name="name" [(ngModel)]="product.name" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label">Precio</label>
          <input type="number" class="form-control" name="price" [(ngModel)]="product.price" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Stock</label>
          <input type="number" class="form-control" name="stock" [(ngModel)]="product.stock" required>
        </div>

        <div class="mb-3">
          <label class="form-label">URL de la Imagen (Opcional)</label>
          <input type="text" class="form-control" name="imageUrl" [(ngModel)]="product.imageUrl">
        </div>

        <div class="mb-3">
          <label class="form-label">Categoría</label>
          <select class="form-select" name="categoria_id" [(ngModel)]="product.categoria_id" required>
            <option value="" disabled selected>Selecciona una categoría...</option>
            <option *ngFor="let cat of categorias" [value]="cat.id">
              {{ cat.nombre }}
            </option>
          </select>
        </div>

        <button type="submit" class="btn btn-success w-100">
          {{ isEditMode ? 'Actualizar Producto' : 'Guardar Producto' }}
        </button>

      </form>
    </div>
  </div>
</div>
